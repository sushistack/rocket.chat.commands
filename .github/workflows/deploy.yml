name: Deploy RC App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx vitest run

      - name: Remove test files before packaging
        run: rm -rf tests

      - name: Deploy to Rocket.Chat
        env:
          RC_URL: ${{ secrets.RC_SERVER_URL }}
          RC_USER: ${{ secrets.RC_USER }}
          RC_PASS: ${{ secrets.RC_PASSWORD }}
        run: npx @rocket.chat/apps-cli deploy --url "$RC_URL" --username "$RC_USER" --password "$RC_PASS" --update --verbose
